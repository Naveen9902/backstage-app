name: iOS Build

on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

jobs:
  build:
    name: Build iOS App (IPA)
    runs-on: macos-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          # Build the app without requiring an Apple Developer Certificate (Unsigned)
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -destination generic/platform=iOS build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          
      - name: Package into IPA
        run: |
          cd ios/App/build/Release-iphoneos
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: ios/App/build/Release-iphoneos/app.ipa
