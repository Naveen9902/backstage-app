name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (IPA)
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install iOS pods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App (no signing)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath DerivedData

      - name: Package IPA
        run: |
          BUILD_DIR="ios/App/DerivedData/Build/Products/Release-iphoneos"
          mkdir -p "$BUILD_DIR/Payload"
          cp -r "$BUILD_DIR/App.app" "$BUILD_DIR/Payload/"
          cd "$BUILD_DIR"
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: ios/App/DerivedData/Build/Products/Release-iphoneos/app.ipa
          retention-days: 7
