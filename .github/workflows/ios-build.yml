name: iOS Build

on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

jobs:
  build:
    name: Build iOS App (IPA)
    runs-on: macos-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main  # Always use the latest main branch, never cache

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Web App (skip type check)
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Skip TypeScript errors during production build
          NEXT_SKIP_TYPE_CHECK: true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build

      - name: Package into IPA
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r App.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: ios/App/build/Build/Products/Release-iphoneos/app.ipa
